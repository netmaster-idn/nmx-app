spring.datasource.url=${NMX_DB_URL}
spring.datasource.username=${NMX_DB_USERNAME}
spring.datasource.password=${NMX_DB_PASSWORD}
nmx.master.datasource.url=${NMX_MASTER_DB_URL}
nmx.master.datasource.username=${NMX_MASTER_DB_USERNAME}
nmx.master.datasource.password=${NMX_MASTER_DB_PASSWORD}
nmx.master.datasource.driver-class-name=${NMX_MASTER_DB_DRIVER:org.postgresql.Driver}
nmx.runtime.schema-sync.enabled=${NMX_RUNTIME_SCHEMA_SYNC_ENABLED:true}
spring.flyway.enabled=false
spring.jpa.properties.hibernate.dialect=${NMX_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.jpa.show-sql=false
spring.thymeleaf.cache=true

server.port=${PORT:8080}
server.shutdown=graceful
server.servlet.session.timeout=${NMX_SESSION_TIMEOUT:30m}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${NMX_SESSION_COOKIE_SECURE:true}
server.servlet.session.cookie.same-site=lax

spring.lifecycle.timeout-per-shutdown-phase=20s

logging.file.name=${NMX_LOG_FILE:/var/log/nmx/nmx.log}
logging.level.root=${NMX_LOG_LEVEL_ROOT:INFO}
logging.level.com.netmaster.nmx=${NMX_LOG_LEVEL_APP:INFO}

nmx.bootstrap.seed-default-users=${NMX_SEED_DEFAULT_USERS:false}
nmx.company.logo-dir=${NMX_COMPANY_LOGO_DIR:/var/lib/nmx/uploads/company-logos}
nmx.company.region-api-base-url=${NMX_COMPANY_REGION_API_BASE_URL:https://emsifa.github.io/api-wilayah-indonesia/api}
nmx.company.region-api-fallback-base-url=${NMX_COMPANY_REGION_API_FALLBACK_BASE_URL:https://wilayah.id/api}
