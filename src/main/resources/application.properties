spring.datasource.url=${NMX_DB_URL:jdbc:h2:file:./data/nmx_tenant_default;MODE=PostgreSQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE}
spring.datasource.username=${NMX_DB_USERNAME:sa}
spring.datasource.password=${NMX_DB_PASSWORD:Domboot007@}
nmx.master.datasource.url=${NMX_MASTER_DB_URL:jdbc:h2:file:./data/nmx_superadmin;MODE=PostgreSQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE}
nmx.master.datasource.username=${NMX_MASTER_DB_USERNAME:${spring.datasource.username}}
nmx.master.datasource.password=${NMX_MASTER_DB_PASSWORD:${spring.datasource.password}}
nmx.master.datasource.driver-class-name=${NMX_MASTER_DB_DRIVER:org.h2.Driver}
nmx.master.schema.auto-init=${NMX_MASTER_SCHEMA_AUTO_INIT:true}
nmx.master.schema.script=${NMX_MASTER_SCHEMA_SCRIPT:classpath:sql/saas/master-schema.sql}
nmx.tenant.enabled=${NMX_TENANT_ENABLED:true}
nmx.inventory.enabled=${NMX_INVENTORY_ENABLED:false}
nmx.runtime.schema-sync.enabled=${NMX_RUNTIME_SCHEMA_SYNC_ENABLED:false}
nmx.tenant.startup-migration.enabled=${NMX_TENANT_STARTUP_MIGRATION_ENABLED:true}
spring.flyway.enabled=false

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${NMX_JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.open-in-view=false
spring.thymeleaf.cache=${NMX_THYMELEAF_CACHE:false}

server.port=8080
server.forward-headers-strategy=framework
server.error.whitelabel.enabled=false

# Enable bootstrap to create default superadmin user (set to true)
nmx.bootstrap.seed-default-users=${NMX_SEED_DEFAULT_USERS:true}
nmx.bootstrap.default-password=${NMX_DEFAULT_PASSWORD:Domboot007@@@}
nmx.company.logo-dir=${NMX_COMPANY_LOGO_DIR:uploads/company-logos}
nmx.company.region-api-base-url=${NMX_COMPANY_REGION_API_BASE_URL:https://emsifa.github.io/api-wilayah-indonesia/api}
nmx.company.region-api-fallback-base-url=${NMX_COMPANY_REGION_API_FALLBACK_BASE_URL:https://wilayah.id/api}
nmx.billing.scheduler-zone=${NMX_BILLING_SCHEDULER_ZONE:Asia/Makassar}
nmx.billing.auto-billing-cron=${NMX_BILLING_AUTO_BILLING_CRON:0 15 0 1 * *}
nmx.billing.auto-suspend-cron=${NMX_BILLING_AUTO_SUSPEND_CRON:0 0 2 * * *}
nmx.whatsapp.reminder-cron=${NMX_WHATSAPP_REMINDER_CRON:0 */10 1-23 * * *}
nmx.whatsapp.gateway.base-url=${NMX_WHATSAPP_GATEWAY_BASE_URL:http://127.0.0.1:3001}
nmx.whatsapp.gateway.timeout-ms=${NMX_WHATSAPP_GATEWAY_TIMEOUT_MS:15000}

nmx.whatsapp.gateway.bootstrap.enabled=${NMX_WHATSAPP_GATEWAY_BOOTSTRAP_ENABLED:true}
nmx.whatsapp.gateway.bootstrap.auto-install=${NMX_WHATSAPP_GATEWAY_AUTO_INSTALL:true}
nmx.whatsapp.gateway.bootstrap.auto-init-client=${NMX_WHATSAPP_GATEWAY_AUTO_INIT_CLIENT:true}
nmx.whatsapp.gateway.bootstrap.directory=${NMX_WHATSAPP_GATEWAY_DIR:whatsapp-gateway}
nmx.whatsapp.gateway.bootstrap.host=${NMX_WHATSAPP_GATEWAY_HOST:127.0.0.1}
nmx.whatsapp.gateway.bootstrap.port=${NMX_WHATSAPP_GATEWAY_PORT:3001}
nmx.whatsapp.gateway.bootstrap.startup-wait-seconds=${NMX_WHATSAPP_GATEWAY_STARTUP_WAIT_SECONDS:15}
nmx.whatsapp.gateway.bootstrap.install-timeout-minutes=${NMX_WHATSAPP_GATEWAY_INSTALL_TIMEOUT_MINUTES:10}
nmx.crypto.secret=${NMX_CRYPTO_SECRET:nmx-default-text-encryption-key-32}
nmx.tenant.host=${NMX_TENANT_DB_HOST:localhost}
nmx.tenant.port=${NMX_TENANT_DB_PORT:5432}
nmx.tenant.admin-username=${NMX_TENANT_DB_ADMIN_USERNAME:postgres}
nmx.tenant.admin-password=${NMX_TENANT_DB_ADMIN_PASSWORD:Domboot007@}
nmx.tenant.driver-class-name=${NMX_TENANT_DB_DRIVER:org.postgresql.Driver}
nmx.tenant.tenant-jdbc-parameters=${NMX_TENANT_DB_JDBC_PARAMS:}
nmx.tenant.flyway-location=${NMX_TENANT_FLYWAY_LOCATION:classpath:db/migration}
nmx.tenant.preload-active-data-sources=${NMX_TENANT_PRELOAD_DATASOURCES:false}
nmx.tenant.max-pool-size=${NMX_TENANT_MAX_POOL_SIZE:4}
nmx.tenant.min-idle=${NMX_TENANT_MIN_IDLE:0}
nmx.tenant.connection-timeout-ms=${NMX_TENANT_CONNECTION_TIMEOUT_MS:15000}
nmx.tenant.idle-timeout-ms=${NMX_TENANT_IDLE_TIMEOUT_MS:60000}
nmx.tenant.max-lifetime-ms=${NMX_TENANT_MAX_LIFETIME_MS:300000}
nmx.tenant.default-plan-code=${NMX_TENANT_DEFAULT_PLAN:TRIAL}
