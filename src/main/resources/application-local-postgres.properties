spring.datasource.url=${NMX_DB_URL:jdbc:postgresql://localhost:5432/nmx_tenant_default}
spring.datasource.username=${NMX_DB_USERNAME:postgres}
spring.datasource.password=${NMX_DB_PASSWORD:Domboot007@}
spring.datasource.driver-class-name=${NMX_DB_DRIVER:org.postgresql.Driver}
spring.datasource.hikari.maximum-pool-size=${NMX_DB_POOL_MAX:6}
spring.datasource.hikari.minimum-idle=${NMX_DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${NMX_DB_POOL_CONNECTION_TIMEOUT_MS:15000}
spring.datasource.hikari.idle-timeout=${NMX_DB_POOL_IDLE_TIMEOUT_MS:60000}
spring.datasource.hikari.max-lifetime=${NMX_DB_POOL_MAX_LIFETIME_MS:300000}

nmx.master.datasource.url=${NMX_MASTER_DB_URL:jdbc:postgresql://localhost:5432/nmx_superadmin}
nmx.master.datasource.username=${NMX_MASTER_DB_USERNAME:${spring.datasource.username}}
nmx.master.datasource.password=${NMX_MASTER_DB_PASSWORD:${spring.datasource.password}}
nmx.master.datasource.driver-class-name=${NMX_MASTER_DB_DRIVER:org.postgresql.Driver}
nmx.master.datasource.hikari.maximum-pool-size=${NMX_MASTER_DB_POOL_MAX:3}
nmx.master.datasource.hikari.minimum-idle=${NMX_MASTER_DB_POOL_MIN_IDLE:0}
nmx.master.datasource.hikari.connection-timeout=${NMX_MASTER_DB_POOL_CONNECTION_TIMEOUT_MS:15000}
nmx.master.datasource.hikari.idle-timeout=${NMX_MASTER_DB_POOL_IDLE_TIMEOUT_MS:60000}
nmx.master.datasource.hikari.max-lifetime=${NMX_MASTER_DB_POOL_MAX_LIFETIME_MS:300000}

spring.jpa.properties.hibernate.dialect=${NMX_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${NMX_JPA_SHOW_SQL:true}
spring.thymeleaf.cache=${NMX_THYMELEAF_CACHE:false}

nmx.runtime.schema-sync.enabled=${NMX_RUNTIME_SCHEMA_SYNC_ENABLED:false}
nmx.tenant.startup-migration.enabled=${NMX_TENANT_STARTUP_MIGRATION_ENABLED:true}
spring.flyway.enabled=false

nmx.bootstrap.seed-default-users=${NMX_SEED_DEFAULT_USERS:true}
nmx.bootstrap.default-password=${NMX_DEFAULT_PASSWORD:Domboot007@@@}

nmx.tenant.host=${NMX_TENANT_DB_HOST:localhost}
nmx.tenant.port=${NMX_TENANT_DB_PORT:5432}
nmx.tenant.admin-username=${NMX_TENANT_DB_ADMIN_USERNAME:postgres}
nmx.tenant.admin-password=${NMX_TENANT_DB_ADMIN_PASSWORD:Domboot007@}
nmx.tenant.driver-class-name=${NMX_TENANT_DB_DRIVER:org.postgresql.Driver}
nmx.tenant.tenant-jdbc-parameters=${NMX_TENANT_DB_JDBC_PARAMS:}
nmx.tenant.flyway-location=${NMX_TENANT_FLYWAY_LOCATION:classpath:db/migration}
nmx.tenant.preload-active-data-sources=${NMX_TENANT_PRELOAD_DATASOURCES:false}
nmx.tenant.max-pool-size=${NMX_TENANT_MAX_POOL_SIZE:4}
nmx.tenant.min-idle=${NMX_TENANT_MIN_IDLE:0}
nmx.tenant.connection-timeout-ms=${NMX_TENANT_CONNECTION_TIMEOUT_MS:15000}
nmx.tenant.idle-timeout-ms=${NMX_TENANT_IDLE_TIMEOUT_MS:60000}
nmx.tenant.max-lifetime-ms=${NMX_TENANT_MAX_LIFETIME_MS:300000}
