<div th:fragment="content">
    <style>
        /* Page Header */
        .page-header-custom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
.header-actions {
            display: flex;
            gap: 12px;
        }
        
        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            flex: 1;
            min-width: 180px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        .stat-icon.green {
            background: rgba(34, 197, 94, 0.1);
            color: var(--status-success);
        }
        
        .stat-icon.blue {
            background: rgba(59, 130, 246, 0.1);
            color: var(--status-info);
        }
        
        .stat-icon.orange {
            background: rgba(249, 115, 22, 0.1);
            color: #f97316;
        }
        
        .stat-icon.red {
            background: rgba(239, 68, 68, 0.1);
            color: var(--status-danger);
        }
        
        .stat-info h4 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
            line-height: 1;
        }
        
        .stat-info p {
            font-size: 12px;
            color: var(--text-muted);
            margin: 4px 0 0 0;
        }
        
        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .chart-legend {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        
        /* Table Container */
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .table-scroll {
            max-height: calc(100vh - 450px);
            overflow-y: auto;
        }
        
        .table-scroll::-webkit-scrollbar {
            width: 6px;
        }
        
        .table-scroll::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }
        
        .table-scroll::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: var(--radius-full);
        }
        
        /* Data Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table thead {
            background: #161616;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        
        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        
        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #1a1a1a;
            color: var(--text-secondary);
            font-size: 13px;
            vertical-align: middle;
        }
        
        .data-table tbody tr {
            transition: background var(--transition-fast);
        }
        
        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        /* SLA Badge */
        .sla-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .sla-badge.good {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }
        
        .sla-badge.warning {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        
        .sla-badge.critical {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        /* Progress Bar */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        
        .progress-fill.green {
            background: linear-gradient(90deg, #22c55e, #4ade80);
        }
        
        .progress-fill.orange {
            background: linear-gradient(90deg, #f97316, #fb923c);
        }
        
        .progress-fill.red {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .page-header-custom {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .header-actions {
                width: 100%;
            }
            
            .stats-row {
                flex-direction: column;
            }
            
            .stat-card {
                min-width: 100%;
            }
            
            .chart-header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
    <div><div class="page-header-custom"><div class="header-actions">
                <button class="btn btn-secondary" onclick="exportSLA()">
                    <i class="fas fa-download"></i>
                    Export
                </button>
            </div>
        </div>

        <!-- Alert Container -->
        <div id="alertContainer"></div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon green">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="stat-info">
                    <h4 id="slaCompliance">92%</h4>
                    <p>SLA Compliance</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h4 id="avgResponse">2.5 Jam</h4>
                    <p>Avg Response Time</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-info">
                    <h4 id="slaBreach">8%</h4>
                    <p>SLA Breach</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red">
                    <i class="fas fa-times-circle"></i>
                </div>
                <div class="stat-info">
                    <h4 id="openComplaint">3</h4>
                    <p>Open Complaint</p>
                </div>
            </div>
        </div>

        <!-- Chart Container -->
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">SLA Compliance Trend</div>
                <div class="chart-legend">
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #22c55e;"></span>
                        Compliance %
                    </div>
                    <div class="legend-item">
                        <span class="legend-dot" style="background: #3b82f6;"></span>
                        Target %
                    </div>
                </div>
            </div>
            <canvas id="slaChart" height="80"></canvas>
        </div>

        <!-- Table Container -->
        <div class="table-container">
            <div class="table-scroll">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Bulan</th>
                            <th>Total Tiket</th>
                            <th>Selesai Tepat Waktu</th>
                            <th>Terlambat</th>
                            <th>Compliance</th>
                            <th>Avg Response</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="slaTableBody">
                        <!-- SLA data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // SLA data
        let slaData = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadSLAData();
        });
        
        // Load SLA data
        async function loadSLAData() {
            try {
                const response = await fetch('/ticketing/api/sla');
                const result = await response.json();
                
                if (result.success) {
                    slaData = result.data;
                    renderTable();
                    initChart();
                }
            } catch (error) {
                console.error('Error loading SLA data:', error);
                // Demo data
                slaData = [
                    { month: 'Januari', total: 45, onTime: 38, late: 7, compliance: 84, avgResponse: 3.2 },
                    { month: 'Februari', total: 52, onTime: 46, late: 6, compliance: 88, avgResponse: 2.8 },
                    { month: 'Maret', total: 48, onTime: 43, late: 5, compliance: 90, avgResponse: 2.5 },
                    { month: 'April', total: 55, onTime: 51, late: 4, compliance: 93, avgResponse: 2.2 },
                    { month: 'Mei', total: 50, onTime: 45, late: 5, compliance: 90, avgResponse: 2.6 },
                    { month: 'Juni', total: 58, onTime: 53, late: 5, compliance: 91, avgResponse: 2.4 }
                ];
                renderTable();
                initChart();
            }
        }
        
        // Render SLA table
        function renderTable() {
            const tbody = document.getElementById('slaTableBody');
            
            tbody.innerHTML = slaData.map(data => {
                const complianceClass = getComplianceClass(data.compliance);
                
                return `
                    <tr>
                        <td>${data.month}</td>
                        <td>${data.total}</td>
                        <td>${data.onTime}</td>
                        <td>${data.late}</td>
                        <td>
                            <div class="progress-bar" style="width: 100px;">
                                <div class="progress-fill ${getProgressColor(data.compliance)}" style="width: ${data.compliance}%;"></div>
                            </div>
                        </td>
                        <td>${data.avgResponse} Jam</td>
                        <td><span class="sla-badge ${complianceClass}">${data.compliance}%</span></td>
                    </tr>
                `;
            }).join('');
        }
        
        // Get compliance class
        function getComplianceClass(compliance) {
            if (compliance >= 90) return 'good';
            if (compliance >= 70) return 'warning';
            return 'critical';
        }
        
        // Get progress color
        function getProgressColor(compliance) {
            if (compliance >= 90) return 'green';
            if (compliance >= 70) return 'orange';
            return 'red';
        }
        
        // Initialize chart
        function initChart() {
            const ctx = document.getElementById('slaChart');
            if (!ctx) return;
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: slaData.map(d => d.month),
                    datasets: [
                        {
                            label: 'Compliance %',
                            data: slaData.map(d => d.compliance),
                            borderColor: '#22c55e',
                            backgroundColor: 'rgba(34, 197, 94, 0.1)',
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: '#22c55e',
                            pointBorderColor: '#22c55e',
                            pointRadius: 4,
                            pointHoverRadius: 6
                        },
                        {
                            label: 'Target %',
                            data: slaData.map(() => 90),
                            borderColor: '#3b82f6',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleColor: '#fff',
                            bodyColor: '#fff',
                            borderColor: 'rgba(255, 255, 255, 0.1)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#9ca3af'
                            }
                        },
                        y: {
                            min: 0,
                            max: 100,
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)'
                            },
                            ticks: {
                                color: '#9ca3af',
                                callback: function(value) {
                                    return value + '%';
                                }
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index'
                    }
                }
            });
        }
        
        // Export SLA
        function exportSLA() {
            showAlert('info', 'Mengekspor data SLA...');
            // In real implementation, this would generate and download a report
            setTimeout(() => {
                showAlert('success', 'Data SLA berhasil diekspor!');
            }, 1500);
        }
        
        // Show alert
        function showAlert(type, message) {
            if (window.nmxNotify) {
                window.nmxNotify({
                    type: type,
                    message: message
                });
                return;
            }

            const alertContainer = document.getElementById('alertContainer');
            if (!alertContainer) return;
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert-message ${type}`;
            
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'error') icon = 'exclamation-circle';
            
            alertDiv.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${message}</span>
            `;
            
            alertContainer.appendChild(alertDiv);
            
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }
    </script>
</div>
