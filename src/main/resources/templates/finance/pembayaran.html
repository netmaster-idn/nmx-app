<div th:fragment="content">
    <style>
        .payment-page {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .payment-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 10px;
            flex: 1 1 720px;
        }

        .toolbar-stack {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 420px;
            margin-left: auto;
            align-self: flex-start;
        }

        .toolbar-search-group {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            order: 2;
        }

        .toolbar-search-group .search-container {
            flex: 1 1 auto;
            max-width: none;
        }

        .quick-action-bar {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            width: 100%;
            order: 1;
        }

        .quick-action-bar .filter-dropdown {
            min-width: 0;
        }

        .search-container {
            position: relative;
            width: 100%;
        }

        .search-container i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-container input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 13px;
        }

        .search-container input:focus,
        .filter-dropdown select:focus {
            outline: none;
            border-color: var(--nmx-orange);
        }

        .filter-dropdown select {
            min-width: 0;
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 12px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--shadow-sm);
            min-height: 62px;
        }

        .stat-icon {
            width: 30px;
            height: 30px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            flex-shrink: 0;
        }

        .stat-icon.green { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
        .stat-icon.blue { background: rgba(59, 130, 246, 0.12); color: #3b82f6; }
        .stat-icon.orange { background: rgba(245, 158, 11, 0.12); color: #f59e0b; }
        .stat-icon.red { background: rgba(239, 68, 68, 0.12); color: #ef4444; }

        .stat-info h4 {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.15;
            color: var(--text-primary);
        }

        .stat-info p {
            margin: 2px 0 0;
            color: var(--text-muted);
            font-size: 10px;
            font-weight: 500;
        }

        .stat-info small {
            display: block;
            margin-top: 0;
            color: var(--text-dim);
            font-size: 9px;
            line-height: 1.35;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .table-scroll {
            overflow: auto;
            max-height: calc(100vh - 360px);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table thead {
            background: #161616;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .data-table th {
            padding: 14px 16px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #1a1a1a;
            color: var(--text-secondary);
            font-size: 13px;
            vertical-align: middle;
        }

        .data-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .invoice-number {
            font-family: var(--font-mono);
            color: var(--nmx-orange);
            font-weight: 500;
        }

        .customer-name {
            color: var(--text-primary);
            font-weight: 600;
        }

        .customer-code {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 4px;
        }

        .payment-type-badge,
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .payment-type-badge.activation {
            background: rgba(59, 130, 246, 0.12);
            border-color: rgba(59, 130, 246, 0.35);
            color: #93c5fd;
        }

        .payment-type-badge.subscription {
            background: rgba(34, 197, 94, 0.10);
            border-color: rgba(34, 197, 94, 0.30);
            color: #86efac;
        }

        .status-badge.overdue {
            background: rgba(239, 68, 68, 0.12);
            color: #fca5a5;
            border-color: rgba(239, 68, 68, 0.32);
        }

        .status-badge.pending,
        .status-badge.partial,
        .status-badge.unpaid {
            background: rgba(245, 158, 11, 0.12);
            color: #fcd34d;
            border-color: rgba(245, 158, 11, 0.28);
        }

        .status-badge.paid {
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            border-color: rgba(34, 197, 94, 0.28);
        }

        .status-badge.cancelled {
            background: rgba(107, 114, 128, 0.12);
            color: #cbd5e1;
            border-color: rgba(107, 114, 128, 0.30);
        }

        .empty-state {
            display: none;
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .empty-state.show {
            display: block;
        }

        .empty-state i {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .alert-message {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 13px;
        }

        .alert-message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .alert-message.success {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }

        @media (max-width: 900px) {
            .payment-header {
                align-items: stretch;
            }

            .stats-grid,
            .toolbar-stack,
            .filter-dropdown,
            .filter-dropdown select,
            .search-container {
                width: 100%;
                max-width: none;
            }

            .toolbar-search-group {
                flex-wrap: wrap;
            }

            .quick-action-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>

    <div class="payment-page">
        <div id="alertContainer"></div>

        <div class="payment-header">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon green"><i class="fas fa-wallet"></i></div>
                    <div class="stat-info">
                        <h4 id="paidThisMonth">Rp. 0</h4>
                        <p>Total Pembayaran</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon blue"><i class="fas fa-receipt"></i></div>
                    <div class="stat-info">
                        <h4 id="transactionCount">0</h4>
                        <p>Transaksi Pembayaran</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <h4 id="pendingCount">0</h4>
                        <p>Belum Lunas</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon red"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <h4 id="averagePayment">Rp. 0</h4>
                        <p>Rata-rata Pembayaran</p>
                    </div>
                </div>
            </div>

            <div class="toolbar-stack">
                <div class="toolbar-search-group">
                    <div class="search-container">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Cari invoice, pelanggan, ID pelanggan, atau metode bayar">
                    </div>
                </div>

                <div class="quick-action-bar">
                    <div class="filter-dropdown">
                        <select id="yearFilter"></select>
                    </div>
                    <div class="filter-dropdown">
                        <select id="monthFilter"></select>
                    </div>
                    <div class="filter-dropdown">
                        <select id="statusFilter">
                            <option value="all">Semua Status</option>
                            <option value="unpaid">Belum Bayar</option>
                            <option value="overdue">Jatuh Tempo</option>
                            <option value="paid">Sudah Bayar</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Tanggal Bayar</th>
                            <th>No. Invoice</th>
                            <th>Pelanggan</th>
                            <th>Jenis Pembayaran</th>
                            <th>Metode</th>
                            <th>Nominal Bayar</th>
                            <th>Sisa Tagihan</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody"></tbody>
                </table>
                <div id="emptyState" class="empty-state">
                    <i class="fas fa-money-check-alt"></i>
                    <h3>Tidak Ada Data Pembayaran</h3>
                    <p>Belum ada pembayaran yang sesuai dengan filter yang dipilih.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let paymentRows = [];
        let filteredPaymentRows = [];
        let selectedYear = '';
        let selectedMonth = '';
        let selectedStatus = 'all';
        let searchKeyword = '';

        document.addEventListener('DOMContentLoaded', async function() {
            await initializePeriodFilters();
            setupFilterInputs();
            setupSearch();
            await loadPayments();

            if (window.nmxBilling) {
                window.nmxBilling.onRefresh(() => loadPayments());
            }
        });

        async function initializePeriodFilters() {
            const now = new Date();
            const yearFilter = document.getElementById('yearFilter');
            const monthFilter = document.getElementById('monthFilter');
            yearFilter.innerHTML = '';

            const availableYears = await fetchAvailableYears();
            availableYears.forEach(year => {
                const option = document.createElement('option');
                option.value = String(year);
                option.textContent = String(year);
                yearFilter.appendChild(option);
            });

            selectedYear = resolvePreferredValue(availableYears, now.getFullYear());
            yearFilter.value = selectedYear;

            await populateMonthFilter(selectedYear, String(now.getMonth() + 1), monthFilter);
        }

        async function loadPayments() {
            try {
                const response = await fetch(`/pelanggan/api/invoices${buildInvoiceQuery()}`);
                const result = await response.json();

                if (!result.success || !Array.isArray(result.data)) {
                    throw new Error(result.message || 'Gagal memuat pembayaran');
                }

                paymentRows = result.data
                    .sort((a, b) => new Date(b.paymentDate || b.billingMonth || 0) - new Date(a.paymentDate || a.billingMonth || 0));

                applyFilters();
                updateStats();
            } catch (error) {
                console.error('Error loading payments:', error);
                showAlert('error', 'Gagal memuat data pembayaran');
            }
        }

        function setupFilterInputs() {
            document.getElementById('yearFilter').addEventListener('change', async function(event) {
                selectedYear = event.target.value || selectedYear;
                await populateMonthFilter(selectedYear, selectedMonth, document.getElementById('monthFilter'));
                loadPayments();
            });

            document.getElementById('monthFilter').addEventListener('change', function(event) {
                selectedMonth = event.target.value || selectedMonth;
                loadPayments();
            });

            document.getElementById('statusFilter').addEventListener('change', function(event) {
                selectedStatus = event.target.value || 'all';
                loadPayments();
            });
        }

        async function fetchAvailableYears() {
            try {
                const response = await fetch('/pelanggan/api/invoices/years');
                const result = await response.json();
                return result.success && Array.isArray(result.data) ? result.data : [];
            } catch (error) {
                console.error('Error loading payment years:', error);
                return [];
            }
        }

        async function fetchAvailableMonths(year) {
            if (!year) {
                return [];
            }

            try {
                const response = await fetch(`/pelanggan/api/invoices/months?year=${encodeURIComponent(year)}`);
                const result = await response.json();
                return result.success && Array.isArray(result.data) ? result.data : [];
            } catch (error) {
                console.error('Error loading payment months:', error);
                return [];
            }
        }

        async function populateMonthFilter(year, preferredMonth, monthFilter) {
            const availableMonths = await fetchAvailableMonths(year);
            const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            monthFilter.innerHTML = '';

            availableMonths.forEach(month => {
                const option = document.createElement('option');
                option.value = String(month);
                option.textContent = monthNames[month - 1] || String(month);
                monthFilter.appendChild(option);
            });

            selectedMonth = resolvePreferredValue(availableMonths, preferredMonth);
            monthFilter.value = selectedMonth;
        }

        function resolvePreferredValue(values, preferredValue) {
            const normalizedValues = Array.isArray(values) ? values.map(value => String(value)) : [];
            const preferred = String(preferredValue || '');
            if (preferred && normalizedValues.includes(preferred)) {
                return preferred;
            }
            return normalizedValues.length > 0 ? normalizedValues[0] : '';
        }

        function buildInvoiceQuery() {
            const params = new URLSearchParams();
            if (selectedYear) {
                params.set('year', selectedYear);
            }
            if (selectedMonth) {
                params.set('month', selectedMonth);
            }
            if (selectedStatus && selectedStatus !== 'all') {
                params.set('status', selectedStatus);
            }
            const query = params.toString();
            return query ? `?${query}` : '';
        }

        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', function(event) {
                searchKeyword = (event.target.value || '').trim().toLowerCase();
                applyFilters();
                updateStats();
            });
        }

        function applyFilters() {
            let rows = [...paymentRows];

            if (selectedStatus === 'paid') {
                rows = rows.filter(row => row.status === 'paid');
            } else if (selectedStatus === 'overdue') {
                rows = rows.filter(row => row.status === 'overdue');
            } else if (selectedStatus === 'unpaid') {
                rows = rows.filter(row => row.status === 'pending' || row.status === 'partial');
            }

            if (searchKeyword) {
                rows = rows.filter(row =>
                    (row.invoiceNumber || '').toLowerCase().includes(searchKeyword) ||
                    (row.customerName || '').toLowerCase().includes(searchKeyword) ||
                    (row.customerCode || '').toLowerCase().includes(searchKeyword) ||
                    (row.paymentMethod || '').toLowerCase().includes(searchKeyword) ||
                    (row.invoiceTypeLabel || '').toLowerCase().includes(searchKeyword)
                );
            }

            filteredPaymentRows = rows;
            renderTable();
        }

        function updateStats() {
            const totalPaid = filteredPaymentRows.reduce((sum, row) => sum + Number(row.amountPaid || 0), 0);
            const transactionCount = filteredPaymentRows.filter(row => Number(row.amountPaid || 0) > 0 || row.paymentDate).length;
            const unpaidCount = filteredPaymentRows.filter(row => row.status === 'pending' || row.status === 'partial').length;

            document.getElementById('paidThisMonth').textContent = formatRupiah(totalPaid);
            document.getElementById('transactionCount').textContent = transactionCount;
            document.getElementById('pendingCount').textContent = unpaidCount;
            document.getElementById('averagePayment').textContent = formatRupiah(transactionCount ? totalPaid / transactionCount : 0);
        }

        function renderTable() {
            const tbody = document.getElementById('paymentTableBody');
            const emptyState = document.getElementById('emptyState');

            if (!filteredPaymentRows.length) {
                tbody.innerHTML = '';
                emptyState.classList.add('show');
                return;
            }

            emptyState.classList.remove('show');
            tbody.innerHTML = filteredPaymentRows.map(row => `
                <tr>
                    <td>${formatDate(row.paymentDate || row.billingMonth)}</td>
                    <td><span class="invoice-number">${escapeHtml(row.invoiceNumber || '-')}</span></td>
                    <td>
                        <div class="customer-name">${escapeHtml(row.customerName || '-')}</div>
                        <div class="customer-code">${escapeHtml(row.customerCode || '-')}</div>
                    </td>
                    <td>
                        <span class="payment-type-badge ${normalizeInvoiceType(row.invoiceType)}">
                            ${escapeHtml(row.invoiceTypeLabel || 'Pembayaran Langganan Bulanan')}
                        </span>
                    </td>
                    <td>${escapeHtml(row.paymentMethod || 'Belum ada')}</td>
                    <td>${formatRupiah(row.amountPaid || 0)}</td>
                    <td>${formatRupiah(row.outstandingAmount || 0)}</td>
                    <td><span class="status-badge ${getStatusClass(row.status)}">${getStatusText(row.status)}</span></td>
                </tr>
            `).join('');
        }

        function normalizeInvoiceType(invoiceType) {
            return String(invoiceType || 'subscription').toLowerCase() === 'activation' ? 'activation' : 'subscription';
        }

        function getStatusClass(status) {
            const normalizedStatus = String(status || 'pending').toLowerCase();
            return window.nmxBilling
                ? window.nmxBilling.getStatusClass(normalizedStatus)
                : (normalizedStatus === 'paid'
                    ? 'paid'
                    : (normalizedStatus === 'overdue'
                        ? 'overdue'
                        : (normalizedStatus === 'cancelled' ? 'cancelled' : 'pending')));
        }

        function getStatusText(status) {
            return window.nmxBilling
                ? window.nmxBilling.getStatusLabel(status)
                : (String(status || '').toLowerCase() === 'paid'
                    ? 'Lunas'
                    : (String(status || '').toLowerCase() === 'overdue' ? 'Jatuh Tempo' : 'Belum Lunas'));
        }

        function formatDate(value) {
            if (!value) return '-';
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? '-' : date.toLocaleDateString('id-ID');
        }

        function formatRupiah(amount) {
            return `Rp. ${new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(Number(amount || 0))}`;
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showAlert(type, message) {
            if (window.nmxNotify) {
                window.nmxNotify({
                    type: type,
                    message: message
                });
                return;
            }

            const container = document.getElementById('alertContainer');
            if (!container) {
                return;
            }

            const div = document.createElement('div');
            div.className = `alert-message ${type}`;
            div.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${escapeHtml(message)}</span>`;
            container.innerHTML = '';
            container.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }
    </script>
</div>
