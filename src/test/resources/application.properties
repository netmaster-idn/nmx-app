spring.datasource.url=${NMX_DB_URL:jdbc:h2:mem:nmx_test_tenant;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE}
spring.datasource.username=${NMX_DB_USERNAME:sa}
spring.datasource.password=${NMX_DB_PASSWORD:}
spring.datasource.driver-class-name=org.h2.Driver
nmx.master.datasource.url=${NMX_MASTER_DB_URL:jdbc:h2:mem:nmx_test_master;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=VALUE}
nmx.master.datasource.username=${NMX_MASTER_DB_USERNAME:${spring.datasource.username}}
nmx.master.datasource.password=${NMX_MASTER_DB_PASSWORD:${spring.datasource.password}}
nmx.master.datasource.driver-class-name=org.h2.Driver
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.initialization-fail-timeout=0
nmx.master.datasource.hikari.maximum-pool-size=1
nmx.master.datasource.hikari.minimum-idle=0
nmx.master.datasource.hikari.initialization-fail-timeout=0
nmx.tenant.enabled=true
nmx.runtime.schema-sync.enabled=false
spring.flyway.enabled=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
nmx.whatsapp.gateway.bootstrap.enabled=false
nmx.whatsapp.gateway.bootstrap.auto-install=false
